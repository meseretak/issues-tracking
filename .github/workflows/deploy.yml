name: 🚀 Deploy to GCP Production

on:
  push:
    branches:
      - main
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

env:
  APP_DIR: ~/awash-tracker

jobs:
  # ── Job 1: Lint & Syntax Check ──────────────────────────────────────────────
  test:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Syntax check frontend JS
        run: |
          node --check frontend/app.js && echo "✅ app.js syntax OK"

      - name: Check Python syntax
        run: |
          python -m py_compile backend/main.py
          python -m py_compile backend/app/models.py
          python -m py_compile backend/app/database.py
          echo "✅ Python syntax OK"

  # ── Job 2: Build & Deploy ────────────────────────────────────────────────────
  deploy:
    name: 🌐 Deploy to GCP
    runs-on: ubuntu-latest
    needs: test          # Only runs if tests pass
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 📦 Deploy via SSH to GCP instance
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST_IP }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "=========================================="
            echo "  🚀 Awash Bank Issue Tracker  Deployment"
            echo "=========================================="

            # If the directory doesn't exist, clone fresh
            if [ ! -d "$HOME/awash-tracker" ]; then
              echo "📥 Cloning repository for the first time..."
              git clone https://github.com/meseretak/issues-tracking.git $HOME/awash-tracker
            fi

            cd $HOME/awash-tracker

            echo "📡 Pulling latest code from GitHub..."
            git fetch --all
            git reset --hard origin/main

            echo "🔨 Building Docker image..."
            docker-compose build --no-cache

            echo "🔄 Restarting containers..."
            docker-compose down
            docker-compose up -d

            echo "⏳ Waiting for server to be ready..."
            sleep 5

            # Health check
            if curl -s --max-time 10 http://localhost:8000/health > /dev/null; then
              echo "✅ Deployment SUCCESSFUL — App is healthy at http://localhost:8000"
            else
              echo "❌ Health check failed — check container logs"
              docker-compose logs --tail=50
              exit 1
            fi

            echo "=========================================="
            echo "  Deployment complete! 🎉"
            echo "=========================================="

  # ── Job 3: Notify ──────────────────────────────────────────────────────────
  notify:
    name: 📣 Notify Status
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Report deployment status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment to GCP SUCCEEDED!"
          else
            echo "❌ Deployment to GCP FAILED — check logs above."
          fi
